<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GameVault">
<meta name="theme-color" content="#0a0a0f">
<title>GameVault · JM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #12121a;
    --card:     #1a1a26;
    --border:   #2a2a3a;
    --accent:   #e63946;
    --accent2:  #ff6b35;
    --gold:     #ffd700;
    --text:     #e8e8f0;
    --muted:    #6b6b88;
    --green:    #4caf50;
    --radius:   10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 0) 0 0;
  }
  .header-inner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .logo span { color: var(--text); }

  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; stroke: var(--muted); fill: none;
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    padding: 8px 10px 8px 32px;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* ── PLATFORM FILTER ── */
  .platform-scroll {
    display: flex; gap: 6px;
    padding: 8px 14px 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .platform-scroll::-webkit-scrollbar { display: none; }
  .pf-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .pf-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .pf-btn:not(.active):active { background: var(--border); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 6px;
    padding: 0 14px 10px;
    font-size: 12px; color: var(--muted);
    align-items: center;
  }
  .stats-bar strong { color: var(--text); font-weight: 600; }
  .dot { width: 3px; height: 3px; background: var(--border); border-radius: 50%; }
  .badge-fin { color: var(--green); }
  .badge-pend { color: var(--accent2); }

  /* ── FILTER ROW ── */
  .filter-row {
    display: flex; gap: 8px;
    padding: 0 14px 10px;
    align-items: center;
  }
  .filter-select {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .filter-select option { background: var(--surface); }

  .btn-add {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 20px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .1s;
  }
  .btn-add:active { transform: scale(.92); }

  /* ── GAME LIST ── */
  #game-list {
    padding: 0 14px;
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    display: flex; flex-direction: column; gap: 8px;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 13px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .game-card.fin::before { background: var(--green); }
  .game-card.pend::before { background: var(--accent2); }
  .game-card.none::before { background: var(--border); }
  .game-card:active { transform: scale(.985); border-color: var(--accent); }

  .platform-badge {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 5px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: .5px;
  }

  .game-info { flex: 1; min-width: 0; }
  .game-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 15px;
    line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .game-sub {
    font-size: 12px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .score-pill {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .score-high { background: rgba(76,175,80,.15); color: var(--green); }
  .score-mid  { background: rgba(255,107,53,.15); color: var(--accent2); }
  .score-low  { background: rgba(230,57,70,.12);  color: var(--accent); }
  .score-none { background: var(--surface); color: var(--muted); font-size: 12px; }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty svg { width: 48px; height: 48px; stroke: var(--border); fill: none; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* ── MODAL (detail) ── */
  .modal-bg {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0 0 calc(20px + env(safe-area-inset-bottom, 0px));
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-handle {
    display: flex; justify-content: center; padding: 12px 0 4px;
  }
  .modal-handle div {
    width: 36px; height: 4px;
    background: var(--border); border-radius: 2px;
  }
  .modal-header {
    padding: 8px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-platform {
    display: inline-block;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 11px;
    padding: 3px 9px; border-radius: 5px;
    margin-bottom: 8px; letter-spacing: .5px;
  }
  .modal-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 22px;
    line-height: 1.2;
  }
  .modal-edition {
    font-size: 13px; color: var(--muted); margin-top: 3px;
  }
  .modal-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }

  .info-row {
    display: flex; align-items: flex-start;
    gap: 10px; font-size: 14px;
  }
  .info-label {
    color: var(--muted); font-size: 12px; min-width: 80px; padding-top: 1px;
    font-weight: 500; letter-spacing: .3px; text-transform: uppercase;
  }
  .info-val { color: var(--text); flex: 1; }
  .info-val.fin-si  { color: var(--green); font-weight: 600; }
  .info-val.fin-no  { color: var(--accent2); font-weight: 600; }
  .score-big {
    display: inline-block;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 20px;
    padding: 4px 12px; border-radius: 8px;
  }
  .modal-obs {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px; color: var(--muted);
    font-style: italic; line-height: 1.5;
  }
  .modal-footer {
    padding: 0 18px;
    display: flex; gap: 8px;
  }
  .btn-close-modal {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 16px;
    padding: 12px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-close-modal:active { background: var(--border); }
  .btn-delete {
    background: rgba(230,57,70,.12);
    border: 1px solid rgba(230,57,70,.3);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 16px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-delete:active { background: rgba(230,57,70,.25); }

  /* ── ADD MODAL ── */
  .add-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0 0 calc(20px + env(safe-area-inset-bottom, 0px));
    animation: slideUp .25s ease;
  }
  .add-modal h2 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 20px;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  .form-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 12px; }
  .form-group label {
    display: block; font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .4px; font-weight: 500;
    margin-bottom: 5px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    padding: 9px 11px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface); }
  .form-textarea { resize: none; min-height: 60px; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .btn-save {
    width: 100%;
    background: var(--accent);
    border: none; border-radius: 10px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 17px;
    padding: 13px;
    cursor: pointer;
    transition: opacity .15s;
    margin: 0 18px; width: calc(100% - 36px);
  }
  .btn-save:active { opacity: .85; }

  /* ── PLATFORM COLORS ── */
  .pf-PS2    { background: rgba(0,64,166,.2);  color: #4d9fff; border: 1px solid rgba(77,159,255,.3); }
  .pf-PS3    { background: rgba(0,64,166,.2);  color: #4d9fff; border: 1px solid rgba(77,159,255,.3); }
  .pf-PS4    { background: rgba(0,55,145,.25); color: #6db3ff; border: 1px solid rgba(109,179,255,.3); }
  .pf-PS5    { background: rgba(0,100,200,.25);color: #80c8ff; border: 1px solid rgba(128,200,255,.3); }
  .pf-XBOX360{ background: rgba(16,124,16,.2); color: #5ccc5c; border: 1px solid rgba(92,204,92,.3); }
  .pf-XBOXONE{ background: rgba(16,124,16,.25);color: #70d970; border: 1px solid rgba(112,217,112,.3); }
  .pf-XBOXS  { background: rgba(0,150,0,.2);   color: #7fe07f; border: 1px solid rgba(127,224,127,.3); }
  .pf-PC     { background: rgba(100,100,200,.2);color: #b0b0ff; border: 1px solid rgba(176,176,255,.3); }
  .pf-DEFAULT{ background: rgba(100,100,100,.2);color: #aaa; border: 1px solid rgba(170,170,170,.2); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── SECTION HEADER ── */
  .section-sep {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 2px 2px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">GAME<span>VAULT</span></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="search" placeholder="Buscar juego..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>
  <div class="platform-scroll" id="pf-filters"></div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="filter-row">
    <select class="filter-select" id="filter-status">
      <option value="">Todos los estados</option>
      <option value="SI">Finalizados</option>
      <option value="NO">Pendientes</option>
      <option value="">Sin marcar</option>
    </select>
    <select class="filter-select" id="filter-sort">
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="score">Mejor puntuación</option>
    </select>
    <button class="btn-add" id="btn-add" title="Añadir juego">＋</button>
  </div>
</header>

<div id="game-list"></div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <div class="modal-handle"><div></div></div>
    <div class="modal-header">
      <div class="modal-platform platform-badge" id="m-platform"></div>
      <div class="modal-title" id="m-title"></div>
      <div class="modal-edition" id="m-edition"></div>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer">
      <button class="btn-close-modal" id="btn-close-modal">Cerrar</button>
      <button class="btn-delete" id="btn-delete">Eliminar</button>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="add-modal-bg">
  <div class="add-modal">
    <div class="modal-handle"><div></div></div>
    <h2>➕ Añadir juego</h2>
    <div class="form-body">
      <div class="form-group">
        <label>Título *</label>
        <input class="form-input" id="f-nombre" type="text" placeholder="Nombre del juego">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Plataforma *</label>
          <select class="form-select" id="f-plataforma">
            <option value="">Seleccionar...</option>
            <option>PS2</option><option>PS3</option><option>PS4</option><option>PS5</option>
            <option>XBOX 360</option><option>XBOX ONE</option><option>XBOX SERIES</option>
            <option>NINTENDO SWITCH</option><option>NINTENDO WII</option>
            <option>NINTENDO 3DS</option><option>NINTENDO DS</option>
            <option>PSONE</option><option>XBOX ORIGINAL</option><option>JUEGOS PC FISICOS</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select class="form-select" id="f-finalizado">
            <option value="">—</option>
            <option value="SI">Finalizado</option>
            <option value="NO">Pendiente</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Edición</label>
          <input class="form-input" id="f-edicion" type="text" placeholder="Opcional">
        </div>
        <div class="form-group">
          <label>Región</label>
          <input class="form-input" id="f-region" type="text" placeholder="PAL / NTSC...">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Puntuación</label>
          <input class="form-input" id="f-puntuacion" type="number" min="0" max="100" placeholder="0-100">
        </div>
        <div class="form-group">
          <label>Género</label>
          <input class="form-input" id="f-genero" type="text" placeholder="Acción, RPG...">
        </div>
      </div>
      <div class="form-group">
        <label>Observaciones</label>
        <textarea class="form-textarea" id="f-observaciones" placeholder="Notas, estado del disco..."></textarea>
      </div>
    </div>
    <button class="btn-save" id="btn-save">Guardar juego</button>
  </div>
</div>

  if (pu === 'PS4') return 'pf-PS4';
  if (pu === 'PS5') return 'pf-PS5';
  if (pu.includes('XBOX 360') || pu.includes('360')) return 'pf-XBOX360';
  if (pu.includes('XBOX ONE') || pu.includes('ONE')) return 'pf-XBOXONE';
  if (pu.includes('XBOX SERIES') || pu.includes('SERIES')) return 'pf-XBOXS';
  if (pu === 'JUEGOS PC FISICOS' || pu === 'PC') return 'pf-PC';
  return 'pf-DEFAULT';
}

// ── SCORE DISPLAY ──
function scoreEl(s) {
  if (!s) return `<span class="score-pill score-none">—</span>`;
  const n = parseFloat(s);
  if (n >= 85) return `<span class="score-pill score-high">${Math.round(n)}</span>`;
  if (n >= 70) return `<span class="score-pill score-mid">${Math.round(n)}</span>`;
  return `<span class="score-pill score-low">${Math.round(n)}</span>`;
}

// ── PLATFORM FILTERS ──
function buildPlatformFilters() {
  const wrap = document.getElementById('pf-filters');
  const counts = {};
  games.forEach(g => { counts[g.plataforma] = (counts[g.plataforma]||0)+1; });
  const total = games.length;

  wrap.innerHTML = ALL_PLATFORMS.map(p => {
    const count = p === 'TODOS' ? total : (counts[p]||0);
    const label = p === 'TODOS' ? `TODOS (${count})` : `${p} (${count})`;
    return `<button class="pf-btn ${p === activePlatform ? 'active':''}" data-pf="${p}">${label}</button>`;
  }).join('');

  wrap.querySelectorAll('.pf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activePlatform = btn.dataset.pf;
      buildPlatformFilters();
      render();
    });
  });
}

// ── RENDER ──
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const status = document.getElementById('filter-status').value;
  const sort = document.getElementById('filter-sort').value;

  let list = games.filter(g => {
    if (activePlatform !== 'TODOS' && g.plataforma !== activePlatform) return false;
    if (q && !g.nombre.toLowerCase().includes(q) && !(g.genero||'').toLowerCase().includes(q)) return false;
    if (status === 'SI' && g.finalizado !== 'SI') return false;
    if (status === 'NO' && g.finalizado !== 'NO') return false;
    return true;
  });

  if (sort === 'za') list.sort((a,b) => b.nombre.localeCompare(a.nombre, 'es'));
  else if (sort === 'score') list.sort((a,b) => (parseFloat(b.puntuacion)||0) - (parseFloat(a.puntuacion)||0));
  else list.sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));

  return list;
}

function render() {
  const list = getFiltered();
  const container = document.getElementById('game-list');

  // stats
  const fin = list.filter(g => g.finalizado === 'SI').length;
  const pend = list.filter(g => g.finalizado === 'NO').length;
  document.getElementById('stats-bar').innerHTML =
    `<strong>${list.length}</strong> juegos <div class="dot"></div> <span class="badge-fin">✓ ${fin} finalizados</span> <div class="dot"></div> <span class="badge-pend">⏳ ${pend} pendientes</span>`;

  if (list.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No se encontraron juegos</p>
    </div>`;
    return;
  }

  container.innerHTML = list.map(g => {
    const finClass = g.finalizado === 'SI' ? 'fin' : g.finalizado === 'NO' ? 'pend' : 'none';
    const sub = [g.edicion, g.region, g.genero].filter(Boolean).join(' · ');
    return `<div class="game-card ${finClass}" data-uid="${g.uid}">
      <span class="platform-badge ${pfClass(g.plataforma)}">${g.plataforma}</span>
      <div class="game-info">
        <div class="game-title">${g.nombre}</div>
        ${sub ? `<div class="game-sub">${sub}</div>` : ''}
      </div>
      ${scoreEl(g.puntuacion)}
    </div>`;
  }).join('');

  container.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', () => openModal(parseInt(card.dataset.uid)));
  });
}

// ── DETAIL MODAL ──
function openModal(uid) {
  const g = games.find(x => x.uid === uid);
  if (!g) return;
  currentUid = uid;

  document.getElementById('m-platform').textContent = g.plataforma;
  document.getElementById('m-platform').className = `modal-platform platform-badge ${pfClass(g.plataforma)}`;
  document.getElementById('m-title').textContent = g.nombre;
  document.getElementById('m-edition').textContent = [g.edicion, g.region].filter(Boolean).join(' · ');

  const rows = [];
  if (g.genero)      rows.push(`<div class="info-row"><span class="info-label">Género</span><span class="info-val">${g.genero}</span></div>`);
  if (g.puntuacion)  rows.push(`<div class="info-row"><span class="info-label">Puntuación</span><span class="info-val">${scoreEl(g.puntuacion)}</span></div>`);
  if (g.finalizado)  rows.push(`<div class="info-row"><span class="info-label">Estado</span><span class="info-val ${g.finalizado==='SI'?'fin-si':g.finalizado==='NO'?'fin-no':''}">${g.finalizado === 'SI' ? '✅ Finalizado' : g.finalizado === 'NO' ? '⏳ Pendiente' : '—'}</span></div>`);
  if (g.observaciones) rows.push(`<div class="modal-obs">📝 ${g.observaciones}</div>`);

  document.getElementById('m-body').innerHTML = rows.length ? rows.join('') : '<p style="color:var(--muted);font-size:14px">Sin datos adicionales</p>';
  document.getElementById('modal-bg').classList.add('open');
}

document.getElementById('btn-close-modal').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => { if(e.target === document.getElementById('modal-bg')) closeModal(); });
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); currentUid = null; }

document.getElementById('btn-delete').addEventListener('click', () => {
  if (!currentUid) return;
  if (!confirm('¿Eliminar este juego de la colección?')) return;
  games = games.filter(g => g.uid !== currentUid);
  saveGames(games);
  closeModal();
  buildPlatformFilters();
  render();
});

// ── ADD MODAL ──
document.getElementById('btn-add').addEventListener('click', () => {
  document.getElementById('add-modal-bg').classList.add('open');
  document.getElementById('f-nombre').focus();
});
document.getElementById('add-modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal-bg')) document.getElementById('add-modal-bg').classList.remove('open');
});
document.getElementById('btn-save').addEventListener('click', () => {
  const nombre = document.getElementById('f-nombre').value.trim();
  const plataforma = document.getElementById('f-plataforma').value;
  if (!nombre || !plataforma) { alert('Título y plataforma son obligatorios'); return; }
  const maxUid = games.reduce((m,g) => Math.max(m,g.uid), 0);
  const newGame = {
    uid: maxUid + 1,
    nombre,
    plataforma,
    genero: document.getElementById('f-genero').value.trim(),
    edicion: document.getElementById('f-edicion').value.trim(),
    region: document.getElementById('f-region').value.trim(),
    valor: '',
    puntuacion: document.getElementById('f-puntuacion').value.trim(),
    finalizado: document.getElementById('f-finalizado').value,
    observaciones: document.getElementById('f-observaciones').value.trim(),
  };
  games.push(newGame);
  saveGames(games);
  document.getElementById('add-modal-bg').classList.remove('open');
  ['f-nombre','f-plataforma','f-genero','f-edicion','f-region','f-puntuacion','f-finalizado','f-observaciones'].forEach(id => {
    const el = document.getElementById(id);
    el.value = el.tagName === 'SELECT' ? '' : '';
  });
  buildPlatformFilters();
  render();
});

// ── SEARCH & FILTER ──
document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-status').addEventListener('change', render);
document.getElementById('filter-sort').addEventListener('change', render);

// ── INIT ──
buildPlatformFilters();
render();
</script>
</body>
</html>
